# /etc/rustunnel/server.toml
#
# Local development config for running rustunnel in Docker with a self-signed
# certificate.  Used by: docker compose -f deploy/docker-compose.local.yml up
#
# Generate the self-signed cert before starting:
#
#   mkdir -p /tmp/rustunnel-certs
#   openssl req -x509 -newkey rsa:2048 \
#     -keyout /tmp/rustunnel-certs/key.pem \
#     -out    /tmp/rustunnel-certs/cert.pem \
#     -days 365 -nodes -subj "/CN=localhost"

[server]
domain         = "localhost"
http_port      = 8080
https_port     = 8443
control_port   = 4040
dashboard_port = 4041

[tls]
# Mounted from the host at runtime (see docker-compose.local.yml volumes).
cert_path = "/certs/cert.pem"
key_path  = "/certs/key.pem"

[auth]
admin_token  = "dev-secret-change-me"
require_auth = false

[database]
# Persisted in a named Docker volume.
path = "/var/lib/rustunnel/rustunnel.db"

[logging]
level  = "debug"
format = "pretty"

[limits]
max_tunnels_per_session    = 10
max_connections_per_tunnel = 50
rate_limit_rps             = 1000
ip_rate_limit_rps          = 0        # 0 = disabled locally
request_body_max_bytes     = 10485760 # 10 MB
tcp_port_range             = [20000, 20099]
